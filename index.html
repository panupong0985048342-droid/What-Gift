<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifts Gachapon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --primary-red: #e63946;
            --gold: #ffb703;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 { color: var(--primary-red); margin: 20px 0; }

        /* 扭蛋机容器 */
        #gacha-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: transparent;
        }

        /* 扭蛋机外壳视觉补完 */
        .machine-body {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 250px;
            background: var(--primary-red);
            border-radius: 20px 20px 10px 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 物理渲染画布 */
        #physics-canvas {
            background: rgba(255, 255, 255, 0.8);
            border: 8px solid #333;
            border-radius: 200px 200px 50px 50px;
            overflow: hidden;
        }

        /* 控制按钮 */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background: var(--gold);
            color: #333;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        /* 输入面板 */
        #setup-panel {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 80px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px;
            box-sizing: border-box;
        }

        /* 结果弹窗 */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: center;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }
    </style>
</head>
<body>

    <h1>Gifts Gachapon</h1>

    <div id="gacha-container">
        <div id="physics-canvas"></div>
        
        <div class="machine-body">
            <div style="margin-top: 40px;">
                <select id="pool-selector">
                    <option value="both">All Mixed (50/50)</option>
                    <option value="big">Only Big Gifts 🎁</option>
                    <option value="tiny">Only Tiny Gifts ✨</option>
                </select>
            </div>
            <div class="controls">
                <button onclick="spin()">扭一下！</button>
            </div>
        </div>
    </div>

    <div id="setup-panel">
        <h3>配置你的扭蛋机 (User 1)</h3>
        <p><small>输入礼物内容，用中文逗号或换行分隔</small></p>
        <label>🎁 Big Gifts:</label>
        <textarea id="big-input" placeholder="例如：新款手机, 旅游机票, 奢侈品包包"></textarea>
        <label>✨ Tiny Gifts:</label>
        <textarea id="tiny-input" placeholder="例如：请喝奶茶, 帮洗一次碗, 抱抱卡"></textarea>
        <button onclick="generateLink()" style="width: 100%; background: var(--primary-red); color: white;">生成分享链接</button>
        <p id="share-url" style="word-break: break-all; color: blue; font-size: 12px;"></p>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="result-modal">
        <h2 id="gift-type">恭喜抽中！</h2>
        <div id="capsule-visual" style="width: 80px; height: 80px; margin: 10px auto; border-radius: 50%; border: 4px solid #333;"></div>
        <h1 id="gift-name" style="color: var(--primary-red);">---</h1>
        <button onclick="closeModal()">收下啦</button>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Vector } = Matter;

        // --- 1. 初始化引擎 ---
        const engine = Engine.create();
        const render = Render.create({
            element: document.getElementById('physics-canvas'),
            engine: engine,
            options: {
                width: 384,
                height: 400,
                wireframes: false, // 设置为 false 才能显示颜色
                background: 'transparent'
            }
        });

        // --- 2. 创建扭蛋机边界 ---
        const wallOptions = { isStatic: true, render: { visible: false } };
        Composite.add(engine.world, [
            Bodies.rectangle(192, 410, 400, 20, wallOptions), // 底
            Bodies.rectangle(-10, 200, 20, 400, wallOptions), // 左
            Bodies.rectangle(394, 200, 20, 400, wallOptions), // 右
            // 顶部圆弧效果由多个小矩形组成模拟
        ]);

        // --- 3. 解析 URL 数据 ---
        let giftData = { big: [], tiny: [] };
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('data')) {
            try {
                giftData = JSON.parse(atob(urlParams.get('data')));
                document.getElementById('setup-panel').style.display = 'none'; // 如果是访问链接，隐藏配置项
            } catch (e) {
                console.error("Data parse error");
            }
        }

        // --- 4. 填充扭蛋 ---
        const capsules = [];
        const colors = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#FF924C'];

        function createCapsules() {
            const count = 25; // 视觉上显示的球数
            for (let i = 0; i < count; i++) {
                const color = colors[i % colors.length];
                const x = Math.random() * 300 + 40;
                const y = Math.random() * 200 + 50;
                
                // 自定义渲染：半圆色块
                const ball = Bodies.circle(x, y, 22, {
                    restitution: 0.6,
                    friction: 0.1,
                    render: {
                        sprite: {
                            // 这里可以通过 canvas 动态生成贴图，简单起见直接用颜色
                        },
                        fillStyle: color,
                        strokeStyle: '#fff',
                        lineWidth: 10
                    }
                });
                capsules.push(ball);
            }
            Composite.add(engine.world, capsules);
        }
        createCapsules();

        // --- 5. 核心逻辑：扭一下 ---
        function spin() {
            // 检查池子是否有东西
            const poolType = document.getElementById('pool-selector').value;
            let currentPool = [];
            
            if (poolType === 'big') currentPool = giftData.big;
            else if (poolType === 'tiny') currentPool = giftData.tiny;
            else currentPool = [...giftData.big, ...giftData.tiny];

            if (currentPool.length === 0) {
                alert("扭蛋机里是空的哦！请User 1先填入礼物内容。");
                return;
            }

            // 1. 物理层：施加随机力实现无序乱飞
            capsules.forEach(ball => {
                const forceMagnitude = 0.05 * ball.mass;
                Matter.Body.applyForce(ball, ball.position, {
                    x: (Math.random() - 0.5) * forceMagnitude * 2,
                    y: -Math.random() * forceMagnitude * 5
                });
            });

            // 2. 动画延迟后显示结果
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * currentPool.length);
                const result = currentPool[randomIndex];
                showResult(result, poolType);
            }, 1500);
        }

        function showResult(name, type) {
            document.getElementById('gift-name').innerText = name;
            document.getElementById('gift-type').innerText = "你抽中了：";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
            
            // 随机个颜色给视觉效果
            const randomCol = colors[Math.floor(Math.random()*colors.length)];
            document.getElementById('capsule-visual').style.background = `linear-gradient(to bottom, ${randomCol} 50%, #fff 50%)`;
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';
        }

        // --- 6. 数据分享逻辑 ---
        function generateLink() {
            const bigVal = document.getElementById('big-input').value.split(/[,，\n]/).filter(i => i.trim());
            const tinyVal = document.getElementById('tiny-input').value.split(/[,，\n]/).filter(i => i.trim());
            
            const data = { big: bigVal, tiny: tinyVal };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
            const url = window.location.origin + window.location.pathname + '?data=' + encoded;
            
            document.getElementById('share-url').innerHTML = `生成的链接（复制发给TA）：<br><a href="${url}">${url}</a>`;
            alert("链接已生成，请向下滚动页面复制链接发给你的男朋友！");
        }

        // 运行引擎
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

    </script>
</body>
</html>
