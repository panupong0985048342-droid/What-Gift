<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifts Gachapon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式保持不变，略作优化 */
        :root { --primary-red: #e63946; --gold: #ffb703; }
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background-color: #fff5f5; font-family: sans-serif; }
        #gacha-container { position: relative; width: 380px; height: 550px; margin-top: 15px; }
        #physics-canvas { background: rgba(255,255,255,0.7); border: 8px solid #333; border-radius: 190px 190px 40px 40px; overflow: hidden; }
        .machine-body { position: absolute; bottom: 0; width: 100%; height: 200px; background: var(--primary-red); border-radius: 20px; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .panel { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid var(--primary-red); }
        button { padding: 12px 20px; border-radius: 25px; border: none; background: var(--gold); font-weight: bold; cursor: pointer; }
        input, textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; margin: 5px 0; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: white; padding: 40px; border-radius: 25px; z-index: 100; text-align: center; border: 5px solid var(--gold); }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:99; }
    </style>
</head>
<body>

    <h1>🎁 Gifts Gachapon</h1>

    <div class="panel">
        <input type="text" id="access-code" placeholder="输入暗号 (如: LOVE1)">
        <button onclick="loadData()" style="width:100%; margin-top:8px;">开启扭蛋机</button>
    </div>

    <div id="gacha-container">
        <div id="physics-canvas"></div>
        <div class="machine-body">
            <select id="pool-selector" style="margin-top:30px; padding:5px;">
                <option value="both">随机全池</option>
                <option value="big">Big Gifts 🎁</option>
                <option value="tiny">Tiny Gifts ✨</option>
            </select>
            <button onclick="spin()" style="margin-top:20px; font-size: 20px; width: 150px;">扭一下！</button>
        </div>
    </div>

    <div class="panel">
        <h3>设置暗号 & 礼物</h3>
        <input type="text" id="set-code" placeholder="设置你的唯一暗号">
        <textarea id="big-input" placeholder="Big Gifts (用逗号隔开)"></textarea>
        <textarea id="tiny-input" placeholder="Tiny Gifts (用逗号隔开)"></textarea>
        <button onclick="saveData()" style="width:100%; background: var(--primary-red); color:white;">保存扭蛋池</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="res-type">获得礼物：</h2>
        <h1 id="res-name" style="color: var(--primary-red); font-size: 36px;">---</h1>
        <button onclick="closeModal()">好耶！</button>
    </div>

    <script>
        // --- 替换为你的 Supabase 信息 ---
        const supabaseUrl = 'https://qqefpwqmdrhwyitlpudr.supabase.co';
        const supabaseKey = 'sb_publishable_91mZYcEwua1ssY47mXAO3g_mNiBV7hW';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 物理引擎初始化 (保持不变)
        const { Engine, Render, Runner, Bodies, Composite } = Matter;
        const engine = Engine.create();
        const render = Render.create({ element: document.getElementById('physics-canvas'), engine: engine, options: { width: 360, height: 350, wireframes: false, background: 'transparent' } });
        
        let giftPool = { big: [], tiny: [] };
        let balls = [];

        function initMachine() {
            Composite.add(engine.world, [
                Bodies.rectangle(180, 360, 400, 20, { isStatic: true, render: { visible: false } }),
                Bodies.rectangle(-10, 150, 20, 400, { isStatic: true }),
                Bodies.rectangle(370, 150, 20, 400, { isStatic: true })
            ]);
            const colors = ['#e63946', '#ffb703', '#a8dadc', '#457b9d'];
            for(let i=0; i<30; i++) {
                const b = Bodies.circle(Math.random()*300+30, Math.random()*200, 18, { restitution: 0.5, render: { fillStyle: colors[i%4], strokeStyle: '#fff', lineWidth: 4 } });
                balls.push(b);
            }
            Composite.add(engine.world, balls);
            Render.run(render);
            Runner.run(Runner.create(), engine);
        }
        initMachine();

        // --- 数据交互：保存 ---
        async function saveData() {
            const code = document.getElementById('set-code').value.trim();
            const big = document.getElementById('big-input').value.split(/[,，\n]/).filter(v => v.trim());
            const tiny = document.getElementById('tiny-input').value.split(/[,，\n]/).filter(v => v.trim());

            if(!code) return alert("暗号不能为空！");

            const { error } = await _supabase.from('gacha_data').upsert({ code: code, content: { big, tiny } });

            if (error) alert("保存失败: " + error.message);
            else alert(`保存成功！快去告诉他暗号：${code}`);
        }

        // --- 数据交互：提取 ---
        async function loadData() {
            const code = document.getElementById('access-code').value.trim();
            const { data, error } = await _supabase.from('gacha_data').select('content').eq('code', code).single();

            if (data) {
                giftPool = data.content;
                alert("已成功加载礼物池！可以开始扭蛋了。");
            } else {
                alert("没找到这个暗号，再检查下？");
            }
        }

        function spin() {
            if(giftPool.big.length === 0 && giftPool.tiny.length === 0) return alert("请先输入暗号加载内容");
            
            balls.forEach(b => Matter.Body.applyForce(b, b.position, { x: (Math.random()-0.5)*0.05, y: -Math.random()*0.12 }));

            setTimeout(() => {
                const type = document.getElementById('pool-selector').value;
                let finalPool = type === 'both' ? [...giftPool.big, ...giftPool.tiny] : giftPool[type];
                if (finalPool.length === 0) finalPool = ["空空的扭蛋机..."];
                
                const prize = finalPool[Math.floor(Math.random()*finalPool.length)];
                document.getElementById('res-name').innerText = prize;
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('modal').style.display = 'block';
            }, 1200);
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
